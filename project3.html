<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Responsive UI/UX Prototype</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

/* Responsive App Container */

.app{
    width:100%;
    max-width:420px;
    background:white;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 4px 15px rgba(0,0,0,0.2);
}

/* Header */

.header{
    background:#007bff;
    color:white;
    text-align:center;
    padding:20px;
}

.header h1{
    font-size:24px;
}

/* Content */

.content{
    padding:20px;
}

.card{
    background:#f1f1f1;
    padding:20px;
    border-radius:15px;
    margin-bottom:15px;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.03);
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#007bff;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#0056b3;
}

/* Mobile Responsive */

@media (max-width:480px){

    .header h1{
        font-size:20px;
    }

    .card{
        padding:15px;
    }

    button{
        font-size:14px;
        padding:12px;
    }
}

/* Tablet Responsive */

@media (min-width:481px) and (max-width:768px){

    .app{
        max-width:500px;
    }
}

/* Desktop Responsive */

@media (min-width:769px){

    .app{
        max-width:600px;
    }

    .header h1{
        font-size:30px;
    }
}

</style>
</head>

<body>

<div class="app">

    <div class="header">
        <h1>Interactive Prototype</h1>
    </div>

    <div class="content">

        <div class="card">
            <h3>Wireframe to Prototype</h3>
            <p>Responsive interactive UI for all devices.</p>
        </div>

        <div class="card">
            <h3>Animations & Navigation</h3>
            <p>Smooth transitions and clickable interactions.</p>
        </div>

        <div class="card">
            <h3>User Testing</h3>
            <p>Collect feedback and improve design experience.</p>
        </div>

        <button onclick="showMessage()">
            Test Prototype
        </button>

    </div>

</div>

<script>

function showMessage(){
    alert("Prototype Tested Successfully!");
}

</script>

</body>
</html>
